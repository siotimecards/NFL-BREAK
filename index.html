<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NFL Break – Siotime</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f4f4;
  text-align:center;
}

/* ===== HERO ===== */
.hero{
  margin:20px auto;
}

.hero img{
  width:90%;
  max-width:700px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* ===== SOCIAL ===== */
#social-bar{
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  gap:25px;
  padding:12px;
  flex-wrap:wrap;
}

.social-item{
  font-size:14px;
}

/* ===== TITRE ===== */
h1{ margin:20px 0 10px }

.timer{
  color:red;
  font-weight:bold;
}

#status{
  font-weight:bold;
  margin-bottom:10px;
}

/* ===== COMPTEUR ===== */
#spotsLeft{
  font-size:18px;
  font-weight:bold;
  margin:10px;
}

/* ===== TEAMS ===== */
.teams{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  margin:20px;
}

.team{
  width:140px;
  padding:10px;
  background:#fff;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:0.2s;
}

.team:hover{
  transform:scale(1.05);
}

.team img{
  width:70px;
  height:70px;
  object-fit:contain;
}

.price{
  color:green;
  font-size:0.9em;
}

.taken{
  opacity:0.4;
  pointer-events:none;
}

/* ===== FLASH ===== */
.flash{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#28a745;
  color:#fff;
  padding:12px 25px;
  border-radius:30px;
  font-weight:bold;
  animation:fade 2s forwards;
  z-index:999;
}

@keyframes fade{
  0%{opacity:0}
  20%{opacity:1}
  80%{opacity:1}
  100%{opacity:0}
}

/* ===== RECAP ===== */
#recap{
  max-width:600px;
  margin:30px auto;
  background:#fff;
  padding:15px;
  border-radius:12px;
}

.recap-item{
  margin:6px;
}
</style>
</head>

<body>

<!-- SOCIAL -->
<div id="social-bar">
  <div class="social-item">📺 YouTube : Siotime</div>
  <div class="social-item">📸 Instagram : siotime.cards</div>
  <div class="social-item">❌ X : @SiotimeCards</div>
</div>

<!-- HERO -->
<div class="hero">
  <!-- IMPORTANT : fichier à la racine -->
  <img src="nfl-break.png" alt="NFL Break Siotime">
</div>

<h1>🏈 NFL Break – Siotime</h1>

<div id="status"></div>
<div class="timer" id="timer"></div>
<div id="spotsLeft"></div>

<div class="teams" id="teams"></div>

<h2>✅ Récap inscrits</h2>
<div id="recap"></div>

<script>
const ENDPOINT = "https://script.google.com/macros/s/AKfycbxCLG5GaC4nluXa29V9zWYWQraVeFdR7mw-oZeFdPsZXUvRgRlRBVOulKFUA3sZns1e/exec";

// 🟢 ouverture
const OPEN = new Date("2026-04-17T20:00:00+02:00");

const teams = [
  {n:"Arizona Cardinals",c:"ari",p:16},
  {n:"Atlanta Falcons",c:"atl",p:24},
  {n:"Baltimore Ravens",c:"bal",p:20},
  {n:"Buffalo Bills",c:"buf",p:24},
  {n:"Carolina Panthers",c:"car",p:20},
  {n:"Chicago Bears",c:"chi",p:24},
  {n:"Cincinnati Bengals",c:"cin",p:24},
  {n:"Cleveland Browns",c:"cle",p:20},
  {n:"Dallas Cowboys",c:"dal",p:20},
  {n:"Denver Broncos",c:"den",p:24},
  {n:"Detroit Lions",c:"det",p:16},
  {n:"Green Bay Packers",c:"gb",p:20},
  {n:"Houston Texans",c:"hou",p:20},
  {n:"Indianapolis Colts",c:"ind",p:20},
  {n:"Jacksonville Jaguars",c:"jax",p:20},
  {n:"Kansas City Chiefs",c:"kc",p:33},
  {n:"Las Vegas Raiders",c:"lv",p:29},
  {n:"Los Angeles Chargers",c:"lac",p:29},
  {n:"Los Angeles Rams",c:"lar",p:16},
  {n:"Miami Dolphins",c:"mia",p:24},
  {n:"Minnesota Vikings",c:"min",p:20},
  {n:"New England Patriots",c:"ne",p:24},
  {n:"New Orleans Saints",c:"no",p:20},
  {n:"New York Giants",c:"nyg",p:37},
  {n:"New York Jets",c:"nyj",p:16},
  {n:"Philadelphia Eagles",c:"phi",p:29},
  {n:"Pittsburgh Steelers",c:"pit",p:24},
  {n:"San Francisco 49ers",c:"sf",p:20},
  {n:"Seattle Seahawks",c:"sea",p:20},
  {n:"Tampa Bay Buccaneers",c:"tb",p:20},
  {n:"Tennessee Titans",c:"ten",p:24},
  {n:"Washington Commanders",c:"wsh",p:29}
];

const teamsDiv = document.getElementById("teams");
const recapDiv = document.getElementById("recap");
const timerDiv = document.getElementById("timer");
const statusDiv = document.getElementById("status");

function flash(msg){
  const d=document.createElement("div");
  d.className="flash";
  d.innerText=msg;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),2000);
}

function render(taken=[]){
  teamsDiv.innerHTML="";

  const now = new Date();
  const isOpen = now >= OPEN;

  statusDiv.innerText = isOpen
    ? "🟢 INSCRIPTIONS OUVERTES"
    : "🔴 PAS ENCORE OUVERT";

  const left = teams.length - taken.length;
  document.getElementById("spotsLeft").innerText =
    `🎟️ ${left} spots restants`;

  teams.forEach(t=>{
    const d=document.createElement("div");
    const isTaken = taken.includes(t.n);

    d.className="team"+(isTaken?" taken":"");

    d.innerHTML=`
      <img src="logos/${t.c}.png" alt="${t.n}">
      <p>${t.n}</p>
      <p class="price">${t.p}€</p>
    `;

    if(!isTaken && isOpen){
      d.onclick=async ()=>{
        const pseudo=prompt("Pseudo ?");
        if(!pseudo) return;
        const social=prompt("Réseau social ?");
        if(!social) return;

        const r=await fetch(ENDPOINT,{
          method:"POST",
          body:JSON.stringify({pseudo,social,team:t.n})
        });

        const j=await r.json();

        if(j.status==="ok"){
          flash("✅ Équipe réservée !");
          load();
        } else {
          alert("Déjà prise !");
        }
      };
    }

    teamsDiv.appendChild(d);
  });
}

async function load(){
  const taken=await (await fetch(ENDPOINT+"?mode=taken")).json();
  render(taken);

  const recap=await (await fetch(ENDPOINT+"?mode=recap")).json();
  recapDiv.innerHTML="";
  recap.forEach(r=>{
    recapDiv.innerHTML+=`<div class="recap-item"><b>${r.pseudo}</b> – ${r.team}</div>`;
  });
}

function updateTimer(){
  const d = OPEN - new Date();

  if(d<=0){
    timerDiv.innerText="⛔ Ouvert";
    return;
  }

  const h=Math.floor(d/36e5);
  const m=Math.floor(d/6e4%60);
  const s=Math.floor(d/1e3%60);

  timerDiv.innerText=`⏳ Ouverture dans ${h}h ${m}m ${s}s`;
}

load();
updateTimer();
setInterval(load,15000);
setInterval(updateTimer,1000);
</script>

</body>
</html>
